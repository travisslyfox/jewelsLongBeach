name: Deploy (OIDC)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::019621594617:role/github-jewels-s3-full-access 
          aws-region: us-west-1

      - name: Test identity
        run: aws sts get-caller-identity

      - name: Deploy example (S3)
        run: aws s3 sync . s3://www.jewelslongbeach.com

